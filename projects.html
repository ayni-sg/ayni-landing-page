<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collaborative Projects | Ayni Social</title>
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
    <header class="navbar">
        <a href="index.html" class="logo">Ayni <span>Social</span></a>
        <nav>
            <a href="index.html">Home</a>
            <a href="groups.html">Communities</a>
            <a href="skills.html">Skills</a>
            <a href="projects.html">Projects</a>
            <a href="products.html">Marketplace</a>
        </nav>
    </header>

    <main class="form-page-container">
        <div class="glass-form-container">
            <h1>Start a Project</h1>
            <p>Ayni projects are collaborative ventures built on mutual aid and shared goals. Recruit collaborators and build together.</p>
            
            <form action="https://formspree.io/f/your-form-id" method="POST" class="interactive-form">
                <div class="form-group">
                    <label for="project_name">Project Title</label>
                    <input type="text" id="project_name" name="project_name" placeholder="e.g., Neighborhood Composting App, Community Fridge" required>
                </div>
                <div class="form-group">
                    <label for="needs">What skills/resources do you need?</label>
                    <input type="text" id="needs" name="needs" placeholder="e.g., UI Design, Plumbing, Extra Space" required>
                </div>
                <div class="form-group">
                    <label for="description">Project Vision & Goals</label>
                    <textarea id="description" name="description" rows="5" placeholder="Describe what you want to build and how it benefits the community. Be specific about the impact." required></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Post Project Idea</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Ayni Social. Built on the principles of reciprocity and mutual aid.</p>
    </footer>
</body>
</html>
