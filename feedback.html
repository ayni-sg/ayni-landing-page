<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shape Ayni Social | Feedback</title>
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
    <header class="navbar">
        <a href="index.html" class="logo">Ayni <span>Social</span></a>
        <nav>
            <a href="index.html">Home</a>
            <a href="groups.html">Communities</a>
            <a href="skills.html">Skills</a>
            <a href="projects.html">Projects</a>
            <a href="products.html">Marketplace</a>
        </nav>
    </header>

    <main class="form-page-container">
        <div class="glass-form-container">
            <h1>Shape Ayni Social</h1>
            <p>We are building this platform for you. Tell us what features or mechanics would make Ayni Social indispensable to your community.</p>
            
            <form action="https://formspree.io/f/your-form-id" method="POST" class="interactive-form">
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" placeholder="Optional/Your Name">
                </div>
                <div class="form-group">
                    <label for="feedback">Your Ideas & Suggestions</label>
                    <textarea id="feedback" name="feedback" rows="6" placeholder="What frustrates you about current social networks? What would you like to see in a reciprocity-driven platform?" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Submit Feedback</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Ayni Social. Built on the principles of reciprocity and mutual aid.</p>
    </footer>
</body>
</html>
